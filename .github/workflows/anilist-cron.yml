name: AniList Fetch Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch AniList Data
        run: node scripts/fetch-anilist.mjs

      - name: Commit and Push Cache
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/anilist-cache.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update anilist cache"
            git push
          else
            echo "No changes to cache."
          fi
